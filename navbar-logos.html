<script>
document.addEventListener('DOMContentLoaded', function () {
  var logos = [
    { src: '/images/logo-unc.png',   alt: 'UNC',   href: 'https://unc.edu' },
    { src: '/images/logo-usc.png',   alt: 'USC',   href: 'https://usc.edu' },
    { src: '/images/logo-chess.png', alt: 'CHESS', href: 'https://www.chess.cornell.edu' },
    { src: '/images/logo-nsf.png',   alt: 'NSF',   href: 'https://www.nsf.gov' }
  ];

  var navContainer = document.querySelector('.navbar-container');
  if (!navContainer) return;

  navContainer.style.position = 'relative';

  var logoGroup = document.createElement('div');
  logoGroup.style.cssText = [
    'position:absolute',
    'left:50%',
    'top:50%',
    'transform:translate(-50%, -50%)',
    'display:flex',
    'align-items:center',
    'gap:24px',
    'pointer-events:none'
  ].join(';');

  logos.forEach(function (logo) {
    var a = document.createElement('a');
    a.href = logo.href;
    a.target = '_blank';
    a.rel = 'noopener noreferrer';
    a.style.cssText = 'display:flex; align-items:center; pointer-events:auto;';
    var img = document.createElement('img');
    img.src = logo.src;
    img.alt = logo.alt;
    img.style.cssText = 'height:48px; width:auto;';
    a.appendChild(img);
    logoGroup.appendChild(a);
  });

  navContainer.appendChild(logoGroup);
});
</script>
